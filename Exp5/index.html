<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 5 - Employee Salary Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Employee Salary Management System</h1>
        <p class="subtitle">Name: Sanghmitra Shakya | Admission No: 2025B15410312</p>

        <div class="form-section">
            <input type="text" id="empName" placeholder="Employee Name">
            <input type="text" id="empId" placeholder="Employee ID">
            <input type="number" id="empSalary" placeholder="Salary">
            <input type="text" id="empDept" placeholder="Department">
            <button class="btn-add" onclick="addEmployee()">Add Employee</button>
        </div>

        <div class="button-row">
            <button class="btn-green" onclick="displayAll()">Display All</button>
            <button class="btn-green" onclick="filterSalary()">Salary &gt; 50000</button>
            <button class="btn-green" onclick="totalSalary()">Total Salary</button>
            <button class="btn-green" onclick="averageSalary()">Average Salary</button>
        </div>
        <div class="button-row">
            <button class="btn-green" onclick="countByDept()">Count by Department</button>
        </div>

        <div id="output" class="output-box"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
